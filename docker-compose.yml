services:
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    command: tail -f /dev/null
    image: institution-scanner:latest
    container_name: institution-scanner
    volumes:
      # Persist cache so incremental downloads work across runs
      - ./cache:/app/cache
      # Persist output so reports are accessible on the host
      - ./output:/app/output
      # Persist logs
      - ./logs:/app/logs
    environment:
      - TZ=America/New_York
    # Uncomment to run on a schedule using a simple cron approach
    # or trigger externally (e.g. systemd timer, cron, Airflow)
    restart: "no"
